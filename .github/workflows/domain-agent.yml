name: Security Agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  #################################################################
  # 1. DOMAIN VALIDATION AGENT
  #################################################################

  validate-domain-policy:

    name: Validate Commit Domains
    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Setup Python
      #############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #############################################################
      # Execute Domain Validation Agent
      #############################################################

      - name: Execute Domain Validation Agent
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

        run: |
          python scripts/check_domain.py

  #################################################################
  # 2. TALISMAN SECRET SCAN
  #################################################################

  talisman-secret-scan:

    name: Talisman Secret Scan

    needs: validate-domain-policy

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Install Talisman
      #############################################################

      - name: Install Talisman
        run: |

          curl -Lo talisman https://github.com/thoughtworks/talisman/releases/latest/download/talisman_linux_amd64

          chmod +x talisman

          sudo mv talisman /usr/local/bin/

      #############################################################
      # Run Talisman Secret Scan
      #############################################################

      - name: Run Talisman Secret Scan
        run: |

          talisman --scan

  #################################################################
  # 3. SEMGREP SAST SCAN
  #################################################################

  semgrep-security-scan:

    name: Semgrep SAST Scan

    needs: talisman-secret-scan

    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Setup Python
      #############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #############################################################
      # Install Semgrep
      #############################################################

      - name: Install Semgrep
        run: |

          python -m pip install --upgrade pip

          pip install semgrep

      #############################################################
      # Create Custom Semgrep Rules
      #############################################################

      - name: Create Custom Semgrep Rules
        run: |

          cat <<EOF > custom-semgrep-rules.yml
          rules:

            - id: hardcoded-password-detection

              patterns:

                - pattern-either:
                    - pattern: password = ...
                    - pattern: pwd = ...
                    - pattern: token = ...
                    - pattern: secret = ...

              message: "Hardcoded credential detected. Remove credentials from source code."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            - id: dangerous-eval-detection

              pattern: eval(...)

              message: "Use of eval() detected. Potential Remote Code Execution vulnerability."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

            - id: dangerous-subprocess-shell

              pattern: subprocess.run(..., shell=True)

              message: "shell=True detected in subprocess.run(). Potential command injection risk."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

          EOF

      #############################################################
      # Execute Semgrep SAST Scan
      #############################################################

      - name: Run Semgrep Security Scan
        run: |

          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/python \
            --config=p/owasp-top-ten \
            --config=custom-semgrep-rules.yml \
            --error