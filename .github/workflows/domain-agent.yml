name: Rule-Based Domain Restriction Agent
on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate-domain-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Execute Python Agent
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}

        run: |
          python scripts/check_domain.py
