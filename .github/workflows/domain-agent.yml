name: Security Agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  #################################################################
  # DOMAIN VALIDATION AGENT
  #################################################################

  validate-domain-policy:

    name: Validate Commit Domains
    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #############################################################
      # Setup Python
      #############################################################

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      #############################################################
      # Execute Domain Validation Agent
      #############################################################

      - name: Execute Domain Validation Agent
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

        run: |
          python scripts/check_domain.py

  #################################################################
  # SEMGREP SAST SCAN
  #################################################################

  semgrep-security-scan:

    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:

      #############################################################
      # Checkout Repository
      #############################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #############################################################
      # Install Semgrep
      #############################################################

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      #############################################################
      # Create Custom Semgrep Rules
      #############################################################

      - name: Create Custom Semgrep Rules
        run: |

          cat <<EOF > custom-semgrep-rules.yml
          rules:

            - id: hardcoded-password-detection

              patterns:

                - pattern-either:
                    - pattern: password = ...
                    - pattern: pwd = ...
                    - pattern: token = ...
                    - pattern: secret = ...

              message: "Hardcoded credential detected. Remove credentials from source code."

              severity: ERROR

              languages:
                - python

              metadata:
                category: security
                confidence: HIGH
                impact: HIGH

          EOF
      #############################################################
      # Execute Semgrep SAST Scan
      #############################################################

      - name: Run Semgrep Security Scan
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/python \
            --config=p/owasp-top-ten \
            --error